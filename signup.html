<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Greensland</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style>
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
</style>
</head>
<body class="bg-stone-50 font-sans text-stone-900 antialiased min-h-screen">

    <!-- Top Bar -->
    <div class="bg-stone-900 px-4 py-2 text-xs font-medium text-stone-300 sm:px-6 lg:px-8 border-b border-stone-800">
        <div class="mx-auto max-w-7xl flex justify-between items-center">
            <span class="flex items-center gap-1.5">
                <span class="h-1.5 w-1.5 rounded-full bg-green-500"></span>
                System Status: Operational
            </span>
            <a href="weather.html" class="hover:text-white transition-colors">Emergency Weather Broadcasts</a>
        </div>
    </div>

    <!-- Nav -->
    <nav class="border-b border-stone-200 bg-white/90 backdrop-blur-md">
        <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
            <div class="flex h-20 justify-between items-center">
                <a href="index.html" class="flex items-center gap-2">
                    <svg class="h-6 w-6 text-green-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v16h16M4 20l7-7 4 4 5-5"/>
                    </svg>
                    <span class="text-lg font-bold tracking-wider uppercase text-stone-900">Greens<span class="text-green-700">land</span></span>
                </a>
                <div class="flex items-center gap-3">
                    <span class="text-xs text-stone-500">Already registered?</span>
                    <a href="login.html" class="text-xs font-bold tracking-wider uppercase border border-stone-300 px-4 py-2.5 rounded hover:bg-stone-50 transition">
                        Login
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main -->
    <main class="py-16 px-4 sm:px-6 lg:px-8">
        <div class="mx-auto max-w-md">

            <!-- Header -->
            <div class="mb-8 space-y-1">
                <div class="text-xs font-bold tracking-widest uppercase text-green-700">Create Account</div>
                <h1 class="text-2xl font-bold tracking-tight text-stone-900">Join the Greensland network</h1>
                <p class="text-sm text-stone-500">Access crop calendars, weather alerts, and wholesale market data.</p>
            </div>

            <!-- Form Card -->
            <div class="bg-white border border-stone-200 rounded shadow-sm p-8 space-y-5">

                <!-- Error / Success Message -->
                <div id="message-box" class="hidden text-xs font-medium px-4 py-3 rounded border"></div>

                <!-- Name -->
                <div class="space-y-1.5">
                    <label class="text-xs font-bold tracking-wider uppercase text-stone-600">Full Name</label>
                    <input id="name" type="text" placeholder="e.g. Chukwuemeka Obi"
                        class="w-full border border-stone-200 rounded px-3 py-2.5 text-sm text-stone-900 placeholder-stone-400 focus:outline-none focus:border-green-600 focus:ring-1 focus:ring-green-600 transition" />
                </div>

                <!-- Email -->
                <div class="space-y-1.5">
                    <label class="text-xs font-bold tracking-wider uppercase text-stone-600">Email Address</label>
                    <input id="email" type="email" placeholder="you@example.com"
                        class="w-full border border-stone-200 rounded px-3 py-2.5 text-sm text-stone-900 placeholder-stone-400 focus:outline-none focus:border-green-600 focus:ring-1 focus:ring-green-600 transition" />
                </div>

                <!-- Password -->
                <div class="space-y-1.5">
                    <label class="text-xs font-bold tracking-wider uppercase text-stone-600">Password</label>
                    <input id="password" type="password" placeholder="Min. 8 characters, one uppercase"
                        class="w-full border border-stone-200 rounded px-3 py-2.5 text-sm text-stone-900 placeholder-stone-400 focus:outline-none focus:border-green-600 focus:ring-1 focus:ring-green-600 transition" />
                </div>

                <!-- User Type -->
                <div class="space-y-1.5">
                    <label class="text-xs font-bold tracking-wider uppercase text-stone-600">Account Type</label>
                    <div class="grid grid-cols-2 gap-3">
                        <button id="btn-farmer" onclick="selectType('farmer')"
                            class="type-btn border border-stone-200 rounded px-4 py-3 text-xs font-bold tracking-wider uppercase text-stone-600 hover:border-green-600 hover:text-green-700 transition text-center">
                            Farmer
                        </button>
                        <button id="btn-wholesaler" onclick="selectType('wholesaler')"
                            class="type-btn border border-stone-200 rounded px-4 py-3 text-xs font-bold tracking-wider uppercase text-stone-600 hover:border-green-600 hover:text-green-700 transition text-center">
                            Wholesaler
                        </button>
                    </div>
                    <input type="hidden" id="user_type" value="" />
                </div>

                <!-- Submit -->
                <button id="signup-btn" onclick="handleSignup()"
                    class="w-full bg-green-700 hover:bg-green-800 text-white text-xs font-bold tracking-wider uppercase px-6 py-3.5 rounded shadow-sm transition mt-2">
                    Create Account
                </button>

            </div>

            <p class="text-center text-xs text-stone-400 mt-6">
                By signing up you agree to Greensland's terms of use.
            </p>
        </div>
    </main>

    <script>
        
        async function handleSignup(){
            const btn = document.getElementById('signup-btn');
            btn.disabled = true;
            btn.innerHTML = '<span style="display:inline-block;width:14px;height:14px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite"></span>';

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const usertype = document.getElementById('user_type').value;

            const response = await fetch ("http://127.0.0.1:8000/signup", {
                method : "POST",
                headers : {"Content-Type" : "application/json"},
                body : JSON.stringify({name, email, password, usertype})
            });


            const data = await response.json();

            if (response.ok){
                window.location.href = "login.html";
                btn.disabled = false;
                btn.innerHTML = "Create Account";
            } else {
                console.log("Signup Failed")
                document.getElementById("message-box").textContent = data.detail;
                document.getElementById("message-box").classList.remove("hidden");
                document.getElementById("message-box").style.cssText = "display:block; background:#fef2f2; border:1px solid #fecaca; color:#dc2626; padding:12px 16px; border-radius:6px; font-size:12px; font-weight:600; text-align:center;";
                btn.disabled = false;
                btn.innerHTML = "Create Account";
            }

        }

        function selectType(value) {
            document.getElementById('user_type').value = value;

            // reset both
            document.getElementById('btn-farmer').style.border = '1px solid #e7e5e4';
            document.getElementById('btn-farmer').style.color = '#57534e';
            document.getElementById('btn-wholesaler').style.border = '1px solid #e7e5e4';
            document.getElementById('btn-wholesaler').style.color = '#57534e';

            // highlight selected
            document.getElementById('btn-' + value).style.border = '2px solid #15803d';
            document.getElementById('btn-' + value).style.color = '#15803d';
        }

    </script>
</body>
</html>
